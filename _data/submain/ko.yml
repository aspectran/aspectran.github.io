aspectow:
  hero:
    title: 엔터프라이즈 안정성
    lead: 신뢰할 수 있는 엔터프라이즈 운영과 원활한 관리 기능을 위해 설계된 고성능 웹 애플리케이션 서버입니다.
    icon: bi-layers-half
    buttons:
      - title: Why Aspectow?
        url: /ko/why-aspectow/
        class: btn-primary
      - title: 시작하기
        url: /ko/docs/aspectow/getting-started/
        class: btn-outline-secondary
        icon: bi-play-fill

  sections:
    - title: 운영 및 설정 가이드
      anchor: aspectow
      cards:
        - title: 환경 설정 가이드
          url: /ko/docs/aspectow/configuration-guide/
          description: Aspectow의 구조와 실운영 환경을 위한 핵심 기능 설정에 대한 체계적인 지침을 제공합니다.
        - title: 배포 및 운영
          url: /ko/docs/aspectow/deployment-and-operations/
          description: 애플리케이션을 배포하고 다양한 운영체제에서 서비스로 관리하는 방법을 배웁니다.
      tags:
        - title: Aspectow 아키텍처
          url: /ko/docs/aspectow/architecture/
        - title: 멀티 컨텍스트 세션
          url: /ko/docs/aspectow/multi-context-session-strategy/
        - title: Nginx 및 클러스터링
          url: /ko/docs/aspectow/nginx-reverse-proxy-guide/

    - title: 실시간 모니터링
      anchor: aspectow-appmon
      cards:
        - title: Aspectow AppMon
          url: /ko/docs/aspectow/appmon/
          description: 시스템 리소스와 애플리케이션 활동을 실시간으로 감시하는 경량 솔루션입니다.
